<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Then Electric Time Clock</title>

<style>

*{
    box-sizing:border-box;
}

body{

    margin:0;

    background:#f3f5f8;

    font-family:Arial, Helvetica, sans-serif;

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

    padding:20px;

}

.login-container{

    width:100%;

    max-width:420px;

    background:white;

    border-radius:18px;

    box-shadow:0 12px 30px rgba(0,0,0,.15);

    padding:35px;

}

.company-logo{

    display:block;

    width:240px;

    max-width:90%;

    margin:0 auto 25px auto;

    height:auto;

}

h1{

    margin:0 0 30px 0;

    text-align:center;

    color:#003C7D;

    font-size:2rem;

}

label{

    display:block;

    margin-bottom:8px;

    font-weight:bold;

    color:#333;

}

input{

    width:100%;

    padding:14px;

    font-size:18px;

    border:1px solid #bdbdbd;

    border-radius:8px;

    margin-bottom:22px;

}

button{

    width:100%;

    padding:15px;

    background:#0057B8;

    color:white;

    font-size:18px;

    font-weight:bold;

    border:none;

    border-radius:8px;

    cursor:pointer;

    transition:.2s;

}

button:hover{

    background:#004899;

}

#message{

    margin-top:20px;

    text-align:center;

    color:#c00000;

    min-height:20px;

}

@media (max-width:600px){

    body{

        background:white;

        padding:12px;

        align-items:flex-start;

    }

    .login-container{

        box-shadow:none;

        border-radius:0;

        padding:15px;

        max-width:100%;

    }

    .company-logo{

        width:220px;

    }

    h1{

        font-size:1.8rem;

    }

}

</style>

</head>

<body>

<div class="login-container">

    <img
        src="images/then-electric-logo.jpg"
        class="company-logo"
        alt="Then Electric Logo">

    <h1>Then Electric Time Clock</h1>

    <label for="phone">Phone Number</label>

    <input
        id="phone"
        type="tel"
        autocomplete="tel">

    <label for="pin">PIN</label>

    <input
        id="pin"
        type="password"
        autocomplete="current-password">

    <button onclick="login()">
        LOGIN
    </button>

    <div id="message"></div>

</div>

<script src="js/api.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>

</body>

</html>
